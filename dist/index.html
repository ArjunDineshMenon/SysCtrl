<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SysCtrl</title>
  <style>
*{box-sizing:border-box;margin:0;padding:0}
.app{display:flex;height:560px;border:0.5px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface-1);font-size:13px}
.sidebar{width:180px;border-right:0.5px solid var(--border);display:flex;flex-direction:column;background:var(--surface-0);padding:12px 0}
.sidebar-logo{padding:0 16px 12px;border-bottom:0.5px solid var(--border);margin-bottom:8px}
.sidebar-logo p{font-size:15px;font-weight:500;color:var(--text-primary)}
.sidebar-logo span{font-size:11px;color:var(--text-muted)}
.nav-section{padding:4px 8px;margin-top:4px}
.nav-section-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;color:var(--text-secondary);transition:background .1s}
.nav-item:hover{background:var(--surface-1)}
.nav-item.active{background:var(--surface-2);color:var(--text-primary);border:0.5px solid var(--border)}
.nav-item i{font-size:16px;width:18px}
.nav-item span{font-size:13px}
.nav-future{opacity:.45}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:12px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.topbar-left p{font-size:15px;font-weight:500;color:var(--text-primary)}
.topbar-left span{font-size:12px;color:var(--text-muted)}
.status-pill{display:flex;align-items:center;gap:6px;background:var(--bg-success);border:0.5px solid var(--border-success);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text-success)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.content{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.stat-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.stat-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:8px;padding:12px}
.stat-card .label{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.stat-card .value{font-size:20px;font-weight:500;color:var(--text-primary);line-height:1.2}
.stat-card .sub{font-size:11px;color:var(--text-secondary);margin-top:2px}
.bar-track{height:4px;background:var(--border-strong);border-radius:2px;margin-top:6px}
.bar-fill{height:4px;border-radius:2px}
.panels-row{display:grid;grid-template-columns:1fr;gap:14px;flex:1}
.panel{background:var(--surface-2);border:0.5px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:8px}
.panel-header{display:flex;align-items:center;gap:6px}
.panel-title{font-size:13px;font-weight:500;color:var(--text-primary);display:flex;align-items:center;gap:6px}
.panel-title i{font-size:15px;color:var(--text-muted)}
.chart-legend{display:flex;gap:14px;margin-left:auto;align-items:center}
.chart-legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-secondary)}
.chart-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chart-area{flex:1;min-height:140px;position:relative;border-radius:4px;overflow:hidden;background:var(--surface-1)}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <p>SysCtrl</p>
        <span>System Control</span>
      </div>
      <nav>
        <div class="nav-section">
          <div class="nav-section-label">Monitoring</div>
          <a class="nav-item active" href="#"><i>📊</i><span>Dashboard</span></a>
          <a class="nav-item" href="#"><i>📈</i><span>History</span></a>
          <a class="nav-item" href="#"><i>⚡</i><span>Power</span></a>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Control</div>
          <a class="nav-item" href="#"><i>⚙️</i><span>Profiles</span></a>
          <a class="nav-item nav-future" href="#"><i>🔧</i><span>Overclock</span></a>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Settings</div>
          <a class="nav-item" href="#"><i>⚙️</i><span>General</span></a>
          <a class="nav-item" href="#"><i>🔔</i><span>Alerts</span></a>
          <a class="nav-item" href="#"><i>🔄</i><span>Updates</span></a>
        </div>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <p>Dashboard</p>
          <span>Real-time system monitoring</span>
        </div>
        <div class="status-pill" id="status-pill">
          <span class="dot" id="status-dot"></span>
          <span id="status-text">Connecting…</span>
        </div>
      </header>

      <div class="content">
        <div class="stat-row">
          <!-- CPU Usage Card -->
          <div class="stat-card">
            <div class="label">CPU Usage</div>
            <div class="value" id="cpu-usage-val">—</div>
            <div class="sub" id="cpu-sub">—</div>
            <div class="bar-track"><div class="bar-fill" id="cpu-usage-bar" style="width:0%;background:#4a9eff"></div></div>
          </div>

          <!-- CPU Temp Card -->
          <div class="stat-card">
            <div class="label">CPU Temp</div>
            <div class="value" id="cpu-temp-val">—</div>
            <div class="sub">Package temperature</div>
            <div class="bar-track"><div class="bar-fill" id="cpu-temp-bar" style="width:0%;background:#4a9eff"></div></div>
          </div>

          <!-- GPU Usage Card -->
          <div class="stat-card">
            <div class="label">GPU Usage</div>
            <div class="value" id="gpu-usage-val">—</div>
            <div class="sub" id="gpu-sub">—</div>
            <div class="bar-track"><div class="bar-fill" id="gpu-usage-bar" style="width:0%;background:#f5a623"></div></div>
          </div>

          <!-- RAM Card -->
          <div class="stat-card">
            <div class="label">RAM</div>
            <div class="value" id="ram-used-val">—</div>
            <div class="sub" id="ram-sub">System memory</div>
            <div class="bar-track"><div class="bar-fill" id="ram-used-bar" style="width:0%;background:#a855f7"></div></div>
          </div>
        </div>

        <div class="panels-row">
          <!-- Chart Panel (full width) -->
          <div class="panel">
            <div class="panel-header">
              <div class="panel-title">
                <i>📈</i> Usage History
              </div>
              <div class="chart-legend">
                <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#4a9eff"></span>CPU</div>
                <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#f5a623"></span>GPU</div>
                <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#a855f7"></span>RAM</div>
              </div>
              <div style="display:flex;gap:4px;margin-left:12px">
                <button class="nav-item" id="chart-tab-1m" data-range="1m" style="padding:2px 8px;font-size:11px">1m</button>
                <button class="nav-item" id="chart-tab-5m" data-range="5m" style="padding:2px 8px;font-size:11px">5m</button>
                <button class="nav-item active" id="chart-tab-1h" data-range="1h" style="padding:2px 8px;font-size:11px">1h</button>
              </div>
            </div>
            <div class="chart-area">
              <svg width="100%" height="100%" viewBox="0 0 600 160" preserveAspectRatio="none">
                <defs>
                  <linearGradient id="cpuGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.3"/>
                    <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
                  </linearGradient>
                  <linearGradient id="gpuGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#f5a623" stop-opacity="0.3"/>
                    <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
                  </linearGradient>
                  <linearGradient id="ramGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/>
                    <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
                  </linearGradient>
                </defs>
                <polyline id="chart-cpu-polyline" fill="url(#cpuGrad)" stroke="#4a9eff" stroke-width="1.5" points="0,160 600,160"/>
                <polyline id="chart-gpu-polyline" fill="url(#gpuGrad)" stroke="#f5a623" stroke-width="1.5" points="0,160 600,160"/>
                <polyline id="chart-ram-polyline" fill="url(#ramGrad)" stroke="#a855f7" stroke-width="1.5" points="0,160 600,160"/>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // ============================================================================
    // SysCtrl Dashboard — Tauri v2 IPC wiring
    // ============================================================================

    (function () {
      'use strict';

      // -----------------------------------------------------------------------
      // Helpers
      // -----------------------------------------------------------------------

      function fmt(val, decimals, suffix) {
        if (val == null) return '\u2014';
        return Number(val).toFixed(decimals) + (suffix || '');
      }

      function setText(el, text) {
        if (el && el.textContent !== text) el.textContent = text;
      }
      function setStyle(el, prop, val) {
        if (el && el.style[prop] !== val) el.style[prop] = val;
      }
      function setAttr(el, attr, val) {
        if (el && el.getAttribute(attr) !== val) el.setAttribute(attr, val);
      }

      function waitForTauri(cb, attempts) {
        attempts = attempts === undefined ? 20 : attempts;
        if (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.event) {
          cb(window.__TAURI__);
        } else if (attempts > 0) {
          setTimeout(function() { waitForTauri(cb, attempts - 1); }, 100);
        } else {
          console.warn('[SysCtrl] Tauri bridge not available after 2s — static preview mode.');
          setText(els.statusText, 'Bridge unavailable');
        }
      }

      // -----------------------------------------------------------------------
      // Chart history state
      // -----------------------------------------------------------------------
      var CHART_WIDTH  = 600;
      var CHART_HEIGHT = 160;
      var chartHistory = { cpu: [], gpu: [], ram: [] };
      var MAX_HISTORY = 60;

      function pushHistory(arr, val) {
        arr.push(val == null ? 0 : val);
        if (arr.length > MAX_HISTORY) arr.shift();
      }

      function historyToPoints(history, width, height) {
        if (!history.length) return '0,' + height + ' ' + width + ',' + height;
        var stepX = width / Math.max(1, history.length - 1);
        var pts = '';
        for (var i = 0; i < history.length; i++) {
          var x = i * stepX;
          var y = height - (history[i] / 100) * height;
          if (i > 0) pts += ' ';
          pts += x.toFixed(1) + ',' + y.toFixed(1);
        }
        return pts;
      }

      // -----------------------------------------------------------------------
      // DOM references
      // -----------------------------------------------------------------------
      var els = {
        cpuUsageVal:      document.getElementById('cpu-usage-val'),
        cpuUsageBar:      document.getElementById('cpu-usage-bar'),
        cpuTempVal:       document.getElementById('cpu-temp-val'),
        cpuTempBar:       document.getElementById('cpu-temp-bar'),
        cpuSub:           document.getElementById('cpu-sub'),
        gpuUsageVal:      document.getElementById('gpu-usage-val'),
        gpuUsageBar:      document.getElementById('gpu-usage-bar'),
        gpuSub:           document.getElementById('gpu-sub'),
        ramUsedVal:       document.getElementById('ram-used-val'),
        ramUsedBar:       document.getElementById('ram-used-bar'),
        ramSub:           document.getElementById('ram-sub'),
        chartCpuPolyline: document.getElementById('chart-cpu-polyline'),
        chartGpuPolyline: document.getElementById('chart-gpu-polyline'),
        chartRamPolyline: document.getElementById('chart-ram-polyline'),
        chartTabs:        document.querySelectorAll('#chart-tab-1m, #chart-tab-5m, #chart-tab-1h'),
        statusDot:        document.getElementById('status-dot'),
        statusText:       document.getElementById('status-text'),
      };

      // -----------------------------------------------------------------------
      // Snapshot rendering
      // -----------------------------------------------------------------------

      function applySnapshot(snap) {
        console.log('[applySnapshot] received:', snap);

        var cpu  = snap.cpu  || {};
        var gpus = snap.gpus || [];
        var ram  = snap.ram  || {};

        // -- CPU usage --
        var cpuPct = cpu.usage_percent != null ? cpu.usage_percent : 0;
        setText(els.cpuUsageVal, fmt(cpuPct, 0, '%'));
        setStyle(els.cpuUsageBar, 'width', cpuPct.toFixed(1) + '%');

        // -- CPU subtitle (cores · freq) --
        if (els.cpuSub) {
          var parts = [];
          if (cpu.core_count != null && cpu.core_count > 0) {
            parts.push(cpu.core_count + ' cores');
          }
          if (cpu.freq_mhz != null) {
            parts.push((cpu.freq_mhz / 1000).toFixed(1) + ' GHz');
          }
          setText(els.cpuSub, parts.length ? parts.join(' \u00b7 ') : '\u2014');
        }

        // -- CPU temp --
        var temp = cpu.temp_celsius;
        setText(els.cpuTempVal, temp != null ? fmt(temp, 0, '\u00b0C') : '\u2014');
        setStyle(els.cpuTempBar, 'width', temp != null ? Math.min(temp, 100).toFixed(1) + '%' : '0%');
        if (els.cpuTempVal) {
          els.cpuTempVal.style.color =
            temp >= 85 ? 'var(--text-danger)'
            : temp >= 70 ? 'var(--text-warning)'
            : '';
        }

        // -- GPU --
        var gpu = gpus.length > 0 ? gpus[0] : null;
        var gpuPct = gpu && gpu.usage_percent != null ? gpu.usage_percent : 0;
        setText(els.gpuUsageVal, gpu ? fmt(gpuPct, 0, '%') : '\u2014');
        setStyle(els.gpuUsageBar, 'width', gpu ? gpuPct.toFixed(1) + '%' : '0%');

        // -- GPU name + VRAM subtitle --
        if (els.gpuSub) {
          if (gpu) {
            var gpuSubText = gpu.name || 'GPU';
            if (gpu.vram_total_mb != null) {
              gpuSubText += ' \u00b7 ' + (gpu.vram_total_mb / 1024).toFixed(1) + ' GB VRAM';
            }
            setText(els.gpuSub, gpuSubText);
          } else {
            setText(els.gpuSub, 'No GPU detected');
          }
        }

        // -- RAM --
        var ramPct = ram.percent != null ? ram.percent : 0;
        if (els.ramUsedVal) {
          if (ram.total_mb != null && ram.total_mb > 0) {
            var usedGB = (ram.used_mb / 1024).toFixed(1);
            var totalGB = (ram.total_mb / 1024).toFixed(1);
            setText(els.ramUsedVal, usedGB + ' / ' + totalGB + ' GB');
          } else {
            setText(els.ramUsedVal, '\u2014');
          }
        }
        setStyle(els.ramUsedBar, 'width', ramPct.toFixed(1) + '%');
        if (els.ramSub) {
          setText(els.ramSub, ramPct.toFixed(0) + '% used');
        }

        // -- Chart history --
        pushHistory(chartHistory.cpu, cpuPct);
        pushHistory(chartHistory.gpu, gpuPct);
        pushHistory(chartHistory.ram, ramPct);
        renderChart();
      }

      // -----------------------------------------------------------------------
      // Chart rendering
      // -----------------------------------------------------------------------
      function renderChart() {
        setAttr(els.chartCpuPolyline, 'points', historyToPoints(chartHistory.cpu, CHART_WIDTH, CHART_HEIGHT));
        setAttr(els.chartGpuPolyline, 'points', historyToPoints(chartHistory.gpu, CHART_WIDTH, CHART_HEIGHT));
        setAttr(els.chartRamPolyline, 'points', historyToPoints(chartHistory.ram, CHART_WIDTH, CHART_HEIGHT));
      }

      // -----------------------------------------------------------------------
      // Chart tab switching
      // -----------------------------------------------------------------------
      els.chartTabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          els.chartTabs.forEach(function (t) { t.classList.toggle('active', t === tab); });
        });
      });

      // -----------------------------------------------------------------------
      // Status indicator
      // -----------------------------------------------------------------------
      function setConnected(ok) {
        if (els.statusDot)  els.statusDot.style.background = ok ? '' : 'var(--text-danger)';
        if (els.statusText) setText(els.statusText, ok ? 'All sensors active' : 'Sensors disconnected');
      }

      // -----------------------------------------------------------------------
      // Boot: initial snapshot + live event listener
      // -----------------------------------------------------------------------
      function boot(tauri) {
        var invoke = tauri.core.invoke;
        var tauriListen = tauri.event.listen;

        console.log('[SysCtrl] Tauri bridge connected, booting...');

        // 1. Fetch initial snapshot
        (async function () {
          try {
            var snap = await invoke('get_snapshot');
            applySnapshot(snap);
            setConnected(true);
          } catch (err) {
            console.error('[SysCtrl] get_snapshot failed:', err);
            setConnected(false);
          }
        })();

        // 2. Listen for live "snapshot" events pushed by the backend at ~1 Hz
        (async function () {
          try {
            await tauriListen('sysctrl://snapshot', function (event) {
              try {
                applySnapshot(event.payload);
                setConnected(true);
              } catch (err) {
                console.error('[SysCtrl] error applying snapshot event:', err);
              }
            });
            console.log('[SysCtrl] Listening for sysctrl://snapshot events');
          } catch (err) {
            console.error('[SysCtrl] failed to register snapshot listener:', err);
          }
        })();
      }

      // Start by waiting for Tauri bridge
      waitForTauri(boot);
    })();
  </script>
</body>
</html>
